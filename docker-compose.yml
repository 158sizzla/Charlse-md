version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    environment:
      - NODE_ENV=production
    volumes:
      - ./session.json:/app/session.json
      - ./logs:/app/logs
    restart: unless-stopped
    # For interactive QR code scanning (development)
    stdin_open: true
    tty: true
